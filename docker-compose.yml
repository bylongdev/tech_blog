services:
  postgres:
    image: postgres:17
    container_name: techblog-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: techblog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d techblog"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: techblog-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    image: node:22-bookworm
    container_name: techblog-worker
    restart: unless-stopped
    working_dir: /workspace
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://admin:admin@postgres:5432/techblog
      REDIS_HOST: redis
      REDIS_PORT: 6379
    command:
      - sh
      - -c
      - corepack enable && pnpm config set store-dir /pnpm/store && pnpm install --frozen-lockfile && pnpm --filter @techblog/worker dev
    volumes:
      - .:/workspace
      - worker_root_node_modules:/workspace/node_modules
      - worker_backend_node_modules:/workspace/apps/backend/node_modules
      - worker_frontend_node_modules:/workspace/apps/frontend/node_modules
      - worker_workers_node_modules:/workspace/apps/workers/node_modules
      - worker_database_node_modules:/workspace/packages/database/node_modules
      - worker_shared_node_modules:/workspace/packages/shared/node_modules
      - pnpm_store:/pnpm/store
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  backend:
    image: node:22-bookworm
    container_name: techblog-backend
    restart: unless-stopped
    working_dir: /workspace
    ports:
      - "${BACKEND_PORT:-4000}:${BACKEND_PORT:-4000}"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://admin:admin@postgres:5432/techblog
      REDIS_HOST: redis
      REDIS_PORT: 6379
    command:
      - sh
      - -c
      - corepack enable && pnpm config set store-dir /pnpm/store && pnpm install --frozen-lockfile && pnpm --filter @techblog/backend dev
    volumes:
      - .:/workspace
      - backend_root_node_modules:/workspace/node_modules
      - backend_backend_node_modules:/workspace/apps/backend/node_modules
      - backend_frontend_node_modules:/workspace/apps/frontend/node_modules
      - backend_workers_node_modules:/workspace/apps/workers/node_modules
      - backend_database_node_modules:/workspace/packages/database/node_modules
      - backend_shared_node_modules:/workspace/packages/shared/node_modules
      - pnpm_store:/pnpm/store
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  pnpm_store:
  worker_root_node_modules:
  worker_backend_node_modules:
  worker_frontend_node_modules:
  worker_workers_node_modules:
  worker_database_node_modules:
  worker_shared_node_modules:
  backend_root_node_modules:
  backend_backend_node_modules:
  backend_frontend_node_modules:
  backend_workers_node_modules:
  backend_database_node_modules:
  backend_shared_node_modules:
