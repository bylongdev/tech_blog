x-app: &app
  image: techblog-app:local
  build:
    context: .
    dockerfile: Dockerfile
  environment: &app-environment
    DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
    REDIS_HOST: redis
    REDIS_PORT: "6379"
    REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  init: true

services:
  postgres:
    image: postgres:17-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      REDISCLI_AUTH: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    command:
      - sh
      - -c
      - exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    <<: *app
    restart: unless-stopped
    environment:
      <<: *app-environment
      NODE_ENV: development
      BACKEND_PORT: "4000"
      FRONTEND_ORIGIN: http://localhost:${FRONTEND_PORT:-3000}
      SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET in .env}
    command: pnpm --filter @techblog/backend dev
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    depends_on:
      worker:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:4000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  worker:
    <<: *app
    restart: unless-stopped
    command:
      - sh
      - -c
      - |
        rm -f /tmp/worker-ready
        pnpm --filter @techblog/database prisma migrate deploy
        pnpm --filter @techblog/worker source:register
        touch /tmp/worker-ready
        exec pnpm --filter @techblog/worker dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/worker-ready"]
      interval: 5s
      timeout: 2s
      retries: 12
      start_period: 10s

