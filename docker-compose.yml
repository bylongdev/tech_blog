services:
  postgres:
    image: postgres:17
    container_name: techblog-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: techblog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d techblog"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: techblog-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: techblog-ollama
  #   ports:
  #     - "11435:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama

  worker:
    image: node:22-bookworm
    container_name: techblog-worker
    restart: unless-stopped
    working_dir: /workspace
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://admin:admin@postgres:5432/techblog
      REDIS_HOST: redis
      REDIS_PORT: 6379
    command:
      - sh
      - -c
      - corepack enable && pnpm config set store-dir /pnpm/store && pnpm install --frozen-lockfile && pnpm --filter @techblog/worker dev
    volumes:
      - .:/workspace
      - worker_node_modules:/workspace/node_modules
      - pnpm_store:/pnpm/store
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  # ollama_data:
  worker_node_modules:
  pnpm_store:
